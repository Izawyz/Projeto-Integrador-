<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="perfil">
            <!-- Use a imagem enviada como padrão -->
            <img src="../imagens/perfil.png" alt="Foto de Perfil" class="foto-perfil">
            <h1>Nome do Usuário</h1>
        </div>
        <form action="login.html" method="POST" class="form-login">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            
            <button type="submit" class="btn-logar">Logar</button>
        </form>
        <div class="actions">
            <button onclick="window.location.href='editar.html'">Editar Perfil</button>
            <button onclick="window.location.href='logout.html'">Sair</button>
        </div>
    </div>
</body>
</html>
